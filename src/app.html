<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />

		<link rel="stylesheet" href="https://use.typekit.net/ziv3vgp.css">
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png">
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png">
		<link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16x16.png">
		<link rel="manifest" href="%sveltekit.assets%/site.webmanifest">
		<link rel="mask-icon" href="%sveltekit.assets%/safari-pinned-tab.svg" color="#5bbad5">
		<meta name="msapplication-TileColor" content="#da532c">
		<meta name="theme-color" content="#ffffff">
		<script src="https://kit.fontawesome.com/78a9146bce.js" crossorigin="anonymous"></script>
		<script src="https://www.google.com/recaptcha/api.js"></script>
		
		

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<form name="contact" netlify netlify-honeypot="bot-field" hidden>
			<input type="text" name="name" />
			<input type="email" name="email" />
			<input type="text" name="subject" />
			<textarea name="message"></textarea>
		  </form>
		<div style="display: contents">%sveltekit.body%</div>
	</body>


</html>
